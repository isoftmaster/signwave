<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign-Wave Premium Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --panel-bg: rgba(30, 41, 59, 0.7);
            --border-color: rgba(255, 255, 255, 0.1);
            --accent: #3b82f6;
            --accent-glow: rgba(59, 130, 246, 0.5);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(at 0% 0%, rgba(59, 130, 246, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(139, 92, 246, 0.15) 0px, transparent 50%);
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        header {
            padding: 1.5rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(12px);
        }

        h1 {
            margin: 0;
            font-size: 1.5rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            background-color: #10b981;
            border-radius: 50%;
            box-shadow: 0 0 10px #10b981;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(16, 185, 129, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
        }

        main {
            flex: 1;
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 2rem;
            padding: 2rem;
            max-width: 1600px;
            margin: 0 auto;
            width: 100%;
            box-sizing: border-box;
        }

        .video-container {
            position: relative;
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            overflow: hidden;
            backdrop-filter: blur(16px);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
        }

        .video-feed {
            width: 100%;
            height: auto;
            display: block;
            object-fit: cover;
            border-bottom: 1px solid var(--border-color);
        }

        .subtitle-bar {
            padding: 1.5rem;
            font-size: 2rem;
            font-weight: 600;
            text-align: center;
            min-height: 4rem;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.2);
            color: #fff;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
            transition: all 0.3s ease;
        }

        .subtitle-bar.active {
            color: var(--accent);
            text-shadow: 0 0 20px var(--accent-glow);
        }

        .sidebar {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .panel {
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 1.5rem;
            backdrop-filter: blur(16px);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .panel h2 {
            margin: 0;
            font-size: 1.1rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .speech-box {
            flex: 1;
            background: rgba(0, 0, 0, 0.2);
            border: 1px inset var(--border-color);
            border-radius: 8px;
            padding: 1rem;
            min-height: 150px;
            overflow-y: auto;
            font-size: 1.1rem;
            line-height: 1.5;
        }

        .btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .btn:hover {
            background: #2563eb;
            box-shadow: 0 0 15px var(--accent-glow);
            transform: translateY(-1px);
        }

        .btn.recording {
            background: #ef4444;
            box-shadow: 0 0 15px rgba(239, 68, 68, 0.5);
        }

        .btn.recording:hover {
            background: #dc2626;
        }
        
        .vocabulary-list {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
        }
        
        .vocab-tag {
            background: rgba(255,255,255,0.1);
            padding: 0.25rem 0.75rem;
            border-radius: 999px;
            font-size: 0.85rem;
            border: 1px solid rgba(255,255,255,0.05);
        }

        @media (max-width: 1024px) {
            main {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <header>
        <h1><div class="status-dot"></div> Sign-Wave</h1>
        <div style="color: var(--text-secondary); font-size: 0.9rem;">Two-Way AI Communication</div>
    </header>

    <main>
        <div class="video-container">
            <img src="/video_feed" class="video-feed" alt="Camera Feed">
            <div class="subtitle-bar" id="subtitle-text">
                Waiting for sign...
            </div>
        </div>

        <div class="sidebar">
            <div class="panel">
                <h2>Mobile Access</h2>
                <div style="text-align: center; margin-top: 0.5rem;">
                    <img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data={{ local_url }}" alt="QR Code" style="border-radius: 8px; border: 4px solid #fff; box-shadow: 0 0 15px rgba(0,0,0,0.5);">
                    <p style="color: var(--text-secondary); font-size: 0.9rem; margin-top: 1rem;">Scan to open dashboard on phone</p>
                </div>
            </div>

            <div class="panel">
                <h2>Recognized Signs</h2>
                <div class="vocabulary-list">
                    <span class="vocab-tag">Yes</span>
                    <span class="vocab-tag">No</span>
                    <span class="vocab-tag">Sorry</span>
                    <span class="vocab-tag">Please & Thank you</span>
                    <span class="vocab-tag">Good afternoon</span>
                    <span class="vocab-tag">Love</span>
                    <span class="vocab-tag">Thank You</span>
                </div>
            </div>

            <div class="panel" style="flex: 1;">
                <h2>Hearing Person's Speech</h2>
                <div class="speech-box" id="speech-transcript">
                    <span style="color: var(--text-secondary); font-style: italic;">Press the microphone button and start speaking...</span>
                </div>
                <button class="btn" id="mic-btn">
                    <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3z"></path><path d="M19 10v2a7 7 0 0 1-14 0v-2"></path><line x1="12" y1="19" x2="12" y2="23"></line><line x1="8" y1="23" x2="16" y2="23"></line></svg>
                    Start Listening
                </button>
            </div>
        </div>
    </main>

    <script>
        // 1. Server-Sent Events for Sign Language Subtitles
        const subtitleEl = document.getElementById('subtitle-text');
        const eventSource = new EventSource('/gesture_events');
        
        let subtitleTimeout;

        eventSource.onmessage = function(event) {
            const gesture = event.data;
            subtitleEl.textContent = gesture;
            subtitleEl.classList.add('active');
            
            clearTimeout(subtitleTimeout);
            subtitleTimeout = setTimeout(() => {
                subtitleEl.classList.remove('active');
                subtitleEl.textContent = 'Waiting for sign...';
            }, 3000);
        };

        // 2. Web Speech API for Two-Way Communication
        const micBtn = document.getElementById('mic-btn');
        const transcriptEl = document.getElementById('speech-transcript');
        
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        let recognition = null;
        let isRecording = false;

        if (SpeechRecognition) {
            recognition = new SpeechRecognition();
            recognition.continuous = true;
            recognition.interimResults = true;

            recognition.onstart = function() {
                isRecording = true;
                micBtn.classList.add('recording');
                micBtn.innerHTML = '<svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect></svg> Stop Listening';
                transcriptEl.innerHTML = '';
            };

            recognition.onresult = function(event) {
                let interimTranscript = '';
                let finalTranscript = '';

                for (let i = event.resultIndex; i < event.results.length; ++i) {
                    if (event.results[i].isFinal) {
                        finalTranscript += event.results[i][0].transcript;
                    } else {
                        interimTranscript += event.results[i][0].transcript;
                    }
                }
                
                // Display text
                if (finalTranscript || interimTranscript) {
                    transcriptEl.innerHTML = 
                        '<span style="color: #fff;">' + finalTranscript + '</span>' +
                        '<span style="color: var(--text-secondary);">' + interimTranscript + '</span>';
                    transcriptEl.scrollTop = transcriptEl.scrollHeight;
                }
            };

            recognition.onerror = function(event) {
                console.error('Speech recognition error', event.error);
                stopRecording();
            };

            recognition.onend = function() {
                if(isRecording) {
                    // Auto-restart if it disconnected but we still want to record
                    recognition.start();
                }
            };

            function stopRecording() {
                isRecording = false;
                recognition.stop();
                micBtn.classList.remove('recording');
                micBtn.innerHTML = '<svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3z"></path><path d="M19 10v2a7 7 0 0 1-14 0v-2"></path><line x1="12" y1="19" x2="12" y2="23"></line><line x1="8" y1="23" x2="16" y2="23"></line></svg> Start Listening';
            }

            micBtn.addEventListener('click', () => {
                if (isRecording) {
                    stopRecording();
                } else {
                    try {
                        recognition.start();
                    } catch(e) {
                        console.error(e);
                    }
                }
            });
        } else {
            micBtn.style.display = 'none';
            transcriptEl.innerHTML = '<span style="color: #ef4444;">Speech Recognition API is not supported in this browser. Try Chrome or Edge.</span>';
        }
    </script>
</body>
</html>
